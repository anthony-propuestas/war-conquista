<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda WGT — WAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { padding: 2rem; max-width: 820px; margin: 0 auto; overflow-y: auto; }
    a.back-link { display: inline-block; margin-bottom: 1.5rem; color: var(--accent);
                  font-family: "Oswald", sans-serif; font-size: .9rem; text-decoration: none; }
    a.back-link:hover { text-decoration: underline; }
    .page-header { text-align: center; margin-bottom: 2rem; }
    .page-header h1 { font-family: "Cinzel", serif; font-size: 2.2rem; color: var(--accent); margin-bottom: .3rem; }
    .page-header p { color: var(--ink-dim); font-family: "Oswald", sans-serif; letter-spacing: 1px; }

    /* Wallet section */
    .wallet-section { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
                      padding: 1.5rem; margin-bottom: 1.5rem; }
    .wallet-section h2 { font-family: "Cinzel", serif; font-size: 1.1rem; color: var(--ink); margin: 0 0 1rem; }
    .wallet-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .stat-box { flex: 1; min-width: 140px; background: var(--bg); border: 1px solid var(--line);
                border-radius: 8px; padding: .75rem 1rem; }
    .stat-box .stat-label { font-family: "Oswald", sans-serif; font-size: .75rem; color: var(--ink-dim);
                             letter-spacing: 1px; text-transform: uppercase; }
    .stat-box .stat-value { font-family: "Cinzel", serif; font-size: 1.4rem; color: var(--accent);
                             margin-top: .2rem; }
    .wallet-addr { font-size: .75rem; color: var(--ink-dim); font-family: monospace;
                   word-break: break-all; margin-top: .75rem; }
    #btn-connect { font-family: "Oswald", sans-serif; letter-spacing: 1px; }
    #btn-claim { font-family: "Oswald", sans-serif; letter-spacing: 1px; }
    .claim-note { font-size: .8rem; color: var(--ink-dim); font-family: "Oswald", sans-serif;
                  margin-top: .5rem; }
    #claim-status { margin-top: .75rem; font-family: "Oswald", sans-serif; font-size: .9rem;
                    min-height: 1.2rem; }
    .status-ok { color: #86efac; }
    .status-err { color: #f87171; }
    .status-pending { color: var(--accent); }

    /* Shop items */
    .shop-section h2 { font-family: "Cinzel", serif; font-size: 1.4rem; color: var(--ink);
                        margin-bottom: 1.2rem; }
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .item-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
                 padding: 1.2rem; display: flex; flex-direction: column; gap: .6rem; }
    .item-card .item-icon { font-size: 2rem; text-align: center; }
    .item-card .item-name { font-family: "Cinzel", serif; font-size: 1rem; color: var(--ink); text-align: center; }
    .item-card .item-desc { font-size: .82rem; color: var(--ink-dim); text-align: center; line-height: 1.4; }
    .item-card .item-meta { display: flex; justify-content: space-between; align-items: center;
                             font-family: "Oswald", sans-serif; font-size: .85rem; }
    .item-card .item-price { color: var(--accent); font-size: 1rem; }
    .item-card .item-qty { color: var(--ink-dim); }
    .item-card .item-owned { font-size: .8rem; color: #86efac; font-family: "Oswald", sans-serif;
                              text-align: center; }
    .item-card .btn-buy { font-family: "Oswald", sans-serif; letter-spacing: 1px; width: 100%; }
    .item-card .buy-status { font-size: .8rem; font-family: "Oswald", sans-serif; text-align: center;
                              min-height: 1.1rem; }
    .tx-note { font-size: .78rem; color: var(--ink-dim); font-family: "Oswald", sans-serif;
               text-align: center; margin-top: .2rem; }
  </style>
</head>
<body>
  <a class="back-link" href="../home/">← Volver</a>

  <div class="page-header">
    <h1>Tienda WGT</h1>
    <p>Gasta tus tokens en cartas para la batalla</p>
  </div>

  <!-- Wallet & balance -->
  <div class="wallet-section">
    <h2>Tu Wallet</h2>
    <div id="wallet-disconnected">
      <button class="btn" id="btn-connect">Conectar MetaMask</button>
    </div>
    <div id="wallet-connected" style="display:none">
      <div class="wallet-row">
        <div class="stat-box">
          <div class="stat-label">Balance WGT</div>
          <div class="stat-value" id="wgt-balance">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">WGT por reclamar</div>
          <div class="stat-value" id="wgt-pending">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">Acumulado este mes</div>
          <div class="stat-value" id="wgt-current">—</div>
          <div class="claim-note" id="wgt-next-date" style="margin-top:.3rem;font-size:.72rem;"></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:.5rem;">
          <button class="btn" id="btn-claim" disabled>Reclamar WGT</button>
          <div class="claim-note">Solo wins de meses anteriores</div>
        </div>
      </div>
      <div class="wallet-addr" id="wallet-addr"></div>
      <div id="claim-status"></div>
    </div>
  </div>

  <!-- Shop items -->
  <div class="shop-section">
    <h2>Catálogo</h2>
    <p class="claim-note" style="margin-bottom:1rem;">
      Comprar requiere 2 transacciones en MetaMask: <strong>Aprobar</strong> y luego <strong>Comprar</strong>.
    </p>
    <div class="items-grid" id="items-grid">
      <div style="color:var(--ink-dim);font-family:'Oswald',sans-serif;">Cargando items...</div>
    </div>
  </div>

  <script type="module">
    import { BrowserProvider, Contract, parseUnits, formatUnits } from 'https://esm.sh/ethers@6';

    const WGT_ADDRESS  = '0x6bc93daAA5e35DECe8f1D676757cfC1D6616b535';
    const SHOP_ADDRESS = '0x197c835cC303088713C1ea3549ef1fB76a3786CA';

    const WGT_ABI = [
      "function balanceOf(address) view returns (uint256)",
      "function approve(address spender, uint256 amount) returns (bool)",
      "function allowance(address owner, address spender) view returns (uint256)"
    ];
    const SHOP_ABI = [
      "function items(uint256) view returns (uint256 wgtPrice, uint256 quantity, bool active)",
      "function buyItem(uint256 itemId) external"
    ];

    const EFFECT_ICON = { EXTRA_UNITS: '🪖', DOUBLE_ATTACK: '⚔️', SHIELD: '🛡️' };

    let provider, signer, walletAddress;
    let wgtContract, shopContract;

    const BASE_CHAIN_ID = 8453; // mainnet; usa 84532 en Sepolia

    // ── UI helpers ──
    function setClaimStatus(msg, type = '') {
      const el = document.getElementById('claim-status');
      el.textContent = msg;
      el.className = type ? `status-${type}` : '';
    }

    function setBuyStatus(itemId, msg, type = '') {
      const el = document.getElementById(`buy-status-${itemId}`);
      if (el) { el.textContent = msg; el.className = `buy-status status-${type}`; }
    }

    // ── Connect ──
    document.getElementById('btn-connect').addEventListener('click', connectWallet);

    async function connectWallet() {
      if (!window.ethereum) {
        alert('MetaMask no está instalado.');
        return;
      }
      provider = new BrowserProvider(window.ethereum);
      await provider.send('eth_requestAccounts', []);
      const network = await provider.getNetwork();
      if (Number(network.chainId) !== BASE_CHAIN_ID) {
        alert(`Cambia a la red Base (chain ID ${BASE_CHAIN_ID}) en MetaMask.`);
        return;
      }
      signer = await provider.getSigner();
      walletAddress = await signer.getAddress();

      wgtContract  = new Contract(WGT_ADDRESS, WGT_ABI, signer);
      shopContract = new Contract(SHOP_ADDRESS, SHOP_ABI, signer);

      document.getElementById('wallet-disconnected').style.display = 'none';
      document.getElementById('wallet-connected').style.display = 'block';
      document.getElementById('wallet-addr').textContent = walletAddress;

      await refreshBalances();
      await loadItems();
    }

    async function refreshBalances() {
      try {
        const [balance, pendingResp] = await Promise.all([
          wgtContract.balanceOf(walletAddress),
          fetch('/api/shop/pending-wgt'),
        ]);
        document.getElementById('wgt-balance').textContent = formatUnits(balance, 18) + ' WGT';
        if (pendingResp.ok) {
          const { total, currentMonth } = await pendingResp.json();
          document.getElementById('wgt-pending').textContent = total + ' WGT';
          document.getElementById('btn-claim').disabled = total === 0;
          document.getElementById('wgt-current').textContent = currentMonth + ' WGT';
          const now = new Date();
          const nextFirst = new Date(now.getFullYear(), now.getMonth() + 1, 1);
          const label = nextFirst.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
          document.getElementById('wgt-next-date').textContent = `Disponible el ${label}`;
        }
      } catch (e) {
        console.error('refreshBalances', e);
      }
    }

    // ── Claim WGT ──
    document.getElementById('btn-claim').addEventListener('click', async () => {
      const btn = document.getElementById('btn-claim');
      btn.disabled = true;
      setClaimStatus('Firmando mensaje...', 'pending');
      try {
        const timestamp = Date.now();
        const userId = await getUserId();
        const message = `claim-wgt:${userId}:${timestamp}`;
        const signature = await signer.signMessage(message);
        setClaimStatus('Minteando WGT en Base...', 'pending');
        const res = await fetch('/api/claim-wgt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ signature, timestamp }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        setClaimStatus(`✓ ${data.amount} WGT reclamados. TX: ${data.txHash.slice(0,10)}...`, 'ok');
        await refreshBalances();
      } catch (e) {
        setClaimStatus('Error: ' + e.message, 'err');
        btn.disabled = false;
      }
    });

    async function getUserId() {
      const res = await fetch('/api/profile');
      if (!res.ok) throw new Error('No autenticado');
      const data = await res.json();
      return data.id;
    }

    // ── Load shop items ──
    async function loadItems() {
      const grid = document.getElementById('items-grid');
      grid.innerHTML = '';

      // Inventario del jugador e items del catálogo (D1) en paralelo
      let owned = {};
      let listings = [];
      try {
        const [invRes, listRes] = await Promise.all([
          fetch('/api/shop/inventory'),
          fetch('/api/shop/listings'),
        ]);
        if (invRes.ok) {
          const { items } = await invRes.json();
          for (const item of (items ?? [])) owned[item.card_def_id] = item.quantity;
        }
        if (listRes.ok) listings = await listRes.json();
      } catch {}

      for (const item of listings) {
        const id    = item.card_def_id;
        const price = parseUnits(String(item.wgt_price ?? 1), 18);

        const icon     = EFFECT_ICON[item.effect_type] ?? '🎴';
        const ownedQty = owned[id] ?? 0;
        const card     = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-icon">${icon}</div>
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.description}</div>
          <div class="item-meta">
            <span class="item-price">${item.wgt_price ?? 1} WGT</span>
          </div>
          <div class="item-owned">En inventario: ${ownedQty}</div>
          <button class="btn btn-buy" id="btn-buy-${id}">Comprar</button>
          <div class="tx-note">Requiere 2 transacciones en MetaMask</div>
          <div class="buy-status" id="buy-status-${id}"></div>
        `;
        grid.appendChild(card);
        document.getElementById(`btn-buy-${id}`).addEventListener('click', () => buyItem(id, price));
      }

      if (grid.children.length === 0) {
        grid.innerHTML = '<div style="color:var(--ink-dim);font-family:\'Oswald\',sans-serif;">No hay items disponibles.</div>';
      }
    }

    // ── Buy item ──
    async function buyItem(itemId, price) {
      const btn = document.getElementById(`btn-buy-${itemId}`);
      btn.disabled = true;
      try {
        setBuyStatus(itemId, 'TX 1/2: Aprobando WGT...', 'pending');
        const approveTx = await wgtContract.approve(SHOP_ADDRESS, price);
        await approveTx.wait();

        setBuyStatus(itemId, 'TX 2/2: Comprando item...', 'pending');
        const buyTx = await shopContract.buyItem(itemId);
        const receipt = await buyTx.wait();

        setBuyStatus(itemId, 'Registrando item...', 'pending');
        const res = await fetch('/api/deliver-item', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ txHash: receipt.hash }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        setBuyStatus(itemId, `✓ ${data.quantity} unidades añadidas al inventario`, 'ok');
        await refreshBalances();
        await loadItems();
      } catch (e) {
        setBuyStatus(itemId, 'Error: ' + (e.reason ?? e.message), 'err');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
