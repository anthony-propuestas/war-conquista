<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1b2a" />
  <title>WAR · Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Oswald:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    #screen-login { display: grid; place-items: center; height: 100vh; padding: 24px; }
    .login-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .login-card .logo {
      font-family: "Cinzel", serif;
      font-size: 2.8rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 4px;
    }
    .login-card .logo span { color: var(--ink-dim); }
    .login-card p { color: var(--ink-dim); font-size: .95rem; line-height: 1.5; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 13px 20px;
      font-size: 1rem;
      font-weight: 600;
      background: #fff;
      color: #3c4043;
      border: 1px solid #dadce0;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow .15s ease, background .15s ease;
    }
    .btn-google:hover { background: #f8f9fa; box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .btn-google svg { flex-shrink: 0; }
    .divider { border: none; border-top: 1px solid var(--line); }
    .back-link { color: var(--ink-dim); font-size: .85rem; text-decoration: none; }
    .back-link:hover { color: var(--ink); }
  </style>
</head>
<body>
  <div id="screen-login">
    <div class="login-card">
      <h1 class="logo">WAR<span>·</span></h1>
      <p>Inicia sesión para guardar tus victorias en el salón de la fama.</p>

      <a href="/api/auth/google" class="btn-google">
        <!-- Google "G" logo oficial -->
        <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        Continuar con Google
      </a>

      <hr class="divider" />
      <a href="/" class="back-link">← Volver al juego sin sesión</a>
    </div>
  </div>
</body>
</html>
