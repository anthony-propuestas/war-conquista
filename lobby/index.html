<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby — WAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      overflow-y: auto;
      min-height: 100vh;
      display: block;
      padding: 0;
    }

    /* ---- Hero ---- */
    .lobby-hero {
      position: relative;
      padding: 3rem 2rem 2.5rem;
      text-align: center;
      background:
        radial-gradient(ellipse 900px 400px at 50% 0%, rgba(224,182,92,.12) 0%, transparent 70%),
        linear-gradient(180deg, rgba(10,22,38,.0) 0%, rgba(10,22,38,.6) 100%);
      border-bottom: 1px solid var(--line);
    }
    .lobby-war-title {
      font-family: "Cinzel", Georgia, serif;
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: 14px;
      color: var(--accent);
      text-shadow: 0 0 60px rgba(224,182,92,.35), 0 4px 20px rgba(0,0,0,.6);
      line-height: 1;
      margin-bottom: .5rem;
    }
    .lobby-tagline {
      font-family: "Oswald", sans-serif;
      font-size: .8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 2rem;
    }
    .lobby-player-card {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      background: var(--panel);
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      padding: .6rem 1.5rem .6rem .6rem;
      box-shadow: 0 0 0 1px rgba(224,182,92,.08), var(--shadow);
    }
    .lobby-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sea) 0%, var(--accent) 100%);
      display: grid; place-items: center;
      font-family: "Cinzel", Georgia, serif;
      font-weight: 800; font-size: 1.2rem;
      color: var(--accent-ink);
      flex-shrink: 0;
    }
    .lobby-player-info { text-align: left; }
    .lobby-player-name {
      font-family: "Cinzel", Georgia, serif;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--ink);
    }
    .lobby-player-meta {
      font-family: "Oswald", sans-serif;
      font-size: .72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink-dim);
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-top: 1px;
    }
    .lobby-wins-badge {
      color: var(--accent);
      background: rgba(224,182,92,.12);
      border: 1px solid rgba(224,182,92,.3);
      border-radius: 999px;
      padding: 0 7px;
      font-size: .7rem;
    }

    /* ---- Main grid ---- */
    .lobby-main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 700px) {
      .lobby-main { grid-template-columns: 1fr; padding: 1.5rem 1rem 2.5rem; }
      .lobby-war-title { font-size: 3rem; letter-spacing: 10px; }
    }

    /* ---- Nav de acciones ---- */
    .lobby-section-title {
      font-family: "Oswald", sans-serif;
      font-size: .72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-bottom: 1rem;
    }
    .nav-actions {
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      text-decoration: none;
      padding: 1rem 1.2rem;
      transition: border-color .18s, background .18s, transform .1s;
      cursor: pointer;
    }
    .action-btn:hover {
      border-color: var(--accent);
      background: var(--panel-2);
      transform: translateX(3px);
    }
    .action-btn.action-primary {
      border-color: rgba(224,182,92,.45);
      background: color-mix(in srgb, var(--accent) 8%, var(--panel));
      box-shadow: 0 0 20px rgba(224,182,92,.08);
    }
    .action-btn.action-primary:hover {
      background: color-mix(in srgb, var(--accent) 14%, var(--panel-2));
      box-shadow: 0 0 30px rgba(224,182,92,.15);
    }
    .action-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
      width: 40px;
      text-align: center;
    }
    .action-text { flex: 1; min-width: 0; }
    .action-name {
      font-family: "Oswald", sans-serif;
      font-size: .95rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--ink);
    }
    .action-btn.action-primary .action-name { color: var(--accent); }
    .action-desc {
      font-size: .76rem;
      color: var(--ink-dim);
      margin-top: 1px;
    }
    .action-arrow {
      color: var(--ink-faint);
      font-size: 1rem;
      flex-shrink: 0;
      transition: color .18s;
    }
    .action-btn:hover .action-arrow { color: var(--accent); }

    /* ---- Inventario de cartas ---- */
    .inventory-panel { }
    .inventory-header {
      display: flex;
      align-items: baseline;
      gap: .75rem;
      margin-bottom: 1rem;
    }
    .inventory-count-badge {
      font-family: "Oswald", sans-serif;
      font-size: .72rem;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 1px 9px;
      color: var(--ink-dim);
    }
    .inventory-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
    }
    .inv-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: .8rem .9rem;
      display: flex;
      flex-direction: column;
      gap: .3rem;
      position: relative;
      overflow: hidden;
    }
    .inv-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--accent);
      border-radius: 10px 0 0 10px;
      opacity: .5;
    }
    .inv-card.all-used { opacity: .5; }
    .inv-card.all-used::before { background: var(--ink-faint); }
    .inv-card-header {
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .inv-card-icon { font-size: 1.3rem; flex-shrink: 0; }
    .inv-card-name {
      font-family: "Cinzel", Georgia, serif;
      font-size: .78rem;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .inv-card.all-used .inv-card-name { color: var(--ink-dim); }
    .inv-card-qty {
      font-family: "Oswald", sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
    }
    .inv-card-qty .qty-avail { color: var(--accent); }
    .inv-card-qty .qty-sep { color: var(--ink-faint); font-size: .85rem; }
    .inv-card-qty .qty-total { color: var(--ink-dim); font-size: .85rem; }
    .inv-card-desc {
      font-size: .71rem;
      color: var(--ink-dim);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .inv-used-tag {
      font-family: "Oswald", sans-serif;
      font-size: .65rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* Empty state */
    .inv-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 2rem 1rem;
      color: var(--ink-dim);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }
    .inv-empty p { font-size: .88rem; margin-top: .4rem; }
    .inv-loading {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--ink-dim);
      font-size: .85rem;
      padding: 1.5rem;
    }

    /* Skeleton while loading hero */
    .skeleton {
      display: inline-block;
      background: linear-gradient(90deg, var(--panel) 25%, var(--panel-2) 50%, var(--panel) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }
  </style>
</head>
<body>

  <!-- Hero -->
  <header class="lobby-hero">
    <div class="lobby-war-title">WAR</div>
    <div class="lobby-tagline">Conquista el mundo</div>
    <div class="lobby-player-card" id="player-card">
      <div class="lobby-avatar" id="avatar-initials">?</div>
      <div class="lobby-player-info">
        <div class="lobby-player-name" id="hero-username"><span class="skeleton" style="width:120px;height:1em;vertical-align:middle;display:inline-block"></span></div>
        <div class="lobby-player-meta">
          <span>Jugador</span>
          <span class="lobby-wins-badge" id="hero-wins" style="display:none"></span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="lobby-main">

    <!-- Left: Navigation -->
    <section>
      <p class="lobby-section-title">Navegar</p>
      <nav class="nav-actions">
        <a class="action-btn action-primary" href="/game">
          <span class="action-icon">⚔️</span>
          <span class="action-text">
            <span class="action-name">Jugar</span>
            <span class="action-desc">Entra al campo de batalla</span>
          </span>
          <span class="action-arrow">›</span>
        </a>
        <a class="action-btn" href="/battle-pass">
          <span class="action-icon">🛡️</span>
          <span class="action-text">
            <span class="action-name">Battle Pass</span>
            <span class="action-desc">Desbloquea recompensas exclusivas</span>
          </span>
          <span class="action-arrow">›</span>
        </a>
        <a class="action-btn" href="/shop">
          <span class="action-icon">🛒</span>
          <span class="action-text">
            <span class="action-name">Tienda</span>
            <span class="action-desc">Compra cartas con WGT</span>
          </span>
          <span class="action-arrow">›</span>
        </a>
        <a class="action-btn" href="/gamers">
          <span class="action-icon">🏆</span>
          <span class="action-text">
            <span class="action-name">Ranking</span>
            <span class="action-desc">Top jugadores del servidor</span>
          </span>
          <span class="action-arrow">›</span>
        </a>
        <a class="action-btn" href="/my-profile">
          <span class="action-icon">👤</span>
          <span class="action-text">
            <span class="action-name">Mi Perfil</span>
            <span class="action-desc">Estadísticas y configuración</span>
          </span>
          <span class="action-arrow">›</span>
        </a>
      </nav>
    </section>

    <!-- Right: Card inventory -->
    <section class="inventory-panel">
      <div class="inventory-header">
        <p class="lobby-section-title" style="margin-bottom:0">Inventario</p>
        <span class="inventory-count-badge" id="inv-badge">—</span>
      </div>
      <div class="inventory-grid" id="inv-grid">
        <div class="inv-loading">Cargando cartas...</div>
      </div>
    </section>

  </main>

  <script type="module">
    const CARD_ICONS = {
      extra_troops:   '⚔️',
      double_attack:  '🗡️',
      shield:         '🛡️',
      spy:            '🕵️',
      sabotage:       '💣',
      fortify:        '🏰',
      default:        '🃏',
    };

    function iconFor(type) {
      return CARD_ICONS[type] || CARD_ICONS.default;
    }

    function groupCards(cards) {
      const map = new Map();
      for (const c of cards) {
        const key = c.name;
        if (!map.has(key)) {
          map.set(key, { name: c.name, desc: c.description, type: c.effect_type, total: 0, available: 0 });
        }
        const entry = map.get(key);
        entry.total++;
        if (!c.used_at) entry.available++;
      }
      return [...map.values()].sort((a, b) => b.available - a.available || b.total - a.total);
    }

    function renderInventory(cards) {
      const grid = document.getElementById('inv-grid');
      const badge = document.getElementById('inv-badge');

      if (!cards.length) {
        badge.textContent = '0 cartas';
        grid.innerHTML = `
          <div class="inv-empty">
            <div style="font-size:2rem">🃏</div>
            <p>No tienes cartas aún.<br>Visita la <a href="/shop" style="color:var(--accent)">Tienda</a> para conseguir algunas.</p>
          </div>`;
        return;
      }

      const groups = groupCards(cards);
      const available = groups.reduce((s, g) => s + g.available, 0);
      badge.textContent = `${available} disponibles · ${cards.length} total`;

      grid.innerHTML = groups.map(g => {
        const allUsed = g.available === 0;
        return `
          <div class="inv-card ${allUsed ? 'all-used' : ''}">
            <div class="inv-card-header">
              <span class="inv-card-icon">${iconFor(g.type)}</span>
              <span class="inv-card-name" title="${g.name}">${g.name}</span>
            </div>
            <div class="inv-card-qty">
              <span class="qty-avail">${g.available}</span>
              <span class="qty-sep"> / </span>
              <span class="qty-total">${g.total}</span>
            </div>
            <div class="inv-card-desc" title="${g.desc}">${g.desc}</div>
            ${allUsed ? '<span class="inv-used-tag">Todas usadas</span>' : ''}
          </div>`;
      }).join('');
    }

    (async function() {
      try {
        const [profileRes, cardsRes] = await Promise.all([
          fetch('/api/profile'),
          fetch('/api/cards/inventory'),
        ]);

        if (profileRes.status === 401 || profileRes.status === 404) {
          window.location.href = '/login.html';
          return;
        }

        const profile = await profileRes.json();
        const cards = cardsRes.ok ? await cardsRes.json() : [];

        // Hero
        document.getElementById('hero-username').textContent = profile.username;
        document.title = profile.username + ' — WAR';
        const initial = (profile.username || '?')[0].toUpperCase();
        document.getElementById('avatar-initials').textContent = initial;

        if (profile.wins != null) {
          const badge = document.getElementById('hero-wins');
          badge.textContent = `${profile.wins} victoria${profile.wins !== 1 ? 's' : ''}`;
          badge.style.display = '';
        }

        // Inventory
        renderInventory(Array.isArray(cards) ? cards : []);

      } catch (_) {
        document.getElementById('hero-username').textContent = 'Error al cargar';
        document.getElementById('inv-grid').innerHTML =
          '<div class="inv-loading" style="color:var(--danger)">Error al cargar inventario</div>';
      }
    })();
  </script>
</body>
</html>
