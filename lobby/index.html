<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby — WAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      overflow: auto;
      min-height: 100vh;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 3rem 4rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .label {
      font-family: "Oswald", sans-serif;
      font-size: 0.75rem;
      color: var(--ink-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }
    .username {
      font-family: "Cinzel", Georgia, serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
    }
    #loading { color: var(--ink-dim); }
    .nav-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 420px;
    }
    .nav-btn {
      display: block;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      text-decoration: none;
      padding: 1.1rem 1.5rem;
      font-family: "Oswald", sans-serif;
      font-size: 1rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
      text-align: center;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">Bienvenido</p>
    <h1 class="username" id="username"><span id="loading">Cargando...</span></h1>
  </div>
  <nav class="nav-grid">
    <a class="nav-btn" href="/game">Jugar</a>
    <a class="nav-btn" href="/battle-pass">Battle Pass</a>
    <a class="nav-btn" href="/my-profile">Mi Perfil</a>
    <a class="nav-btn" href="/gamers">Ranking</a>
    <a class="nav-btn" href="/shop">Tienda</a>
  </nav>

  <script type="module">
    (async function() {
      try {
        const res = await fetch('/api/profile');
        if (res.status === 401 || res.status === 404) {
          window.location.href = '/login.html';
          return;
        }
        const data = await res.json();
        document.getElementById('username').textContent = data.username;
        document.title = data.username + ' — WAR';
      } catch (_) {
        document.getElementById('loading').textContent = 'Error al cargar';
      }
    })();
  </script>
</body>
</html>
